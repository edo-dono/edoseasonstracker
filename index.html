<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="edoSeasonsTracker">
<meta name="theme-color" content="#FBF7F2">
<meta name="description" content="Saisonnalité des fruits, légumes, champignons, oléagineux et produits suisses : période, conservation et origine recommandée.">
<title>edoSeasonsTracker</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --accent:#E0892F;        /* abricot — accent texte / actif */
    --accent-2:#D9663F;      /* terracotta — favoris */
    --s-ext:#F4A24A;         /* de saison, culture en extérieur */
    --s-serre:#7CB36A;       /* culture sous serre */
    --s-cons:#F8D9B4;        /* conservation / disponible */
    --s-off:#ECE4DA;         /* hors saison */
    --fruit:#2E7DD1;         /* tag fruit (bleu) */
    --leg:#4E8B3D;           /* tag légume (vert) */
    --champ:#7E7368;         /* tag champignon (gris) — inversé */
    --divers:#9B6FB0;        /* tag divers (mauve) — inversé */
    --oleo:#B5852F;          /* tag oléagineux (ocre) */
    --bg:#FBF7F2;
    --surface:#FFFFFF;
    --surface-2:#F4EEE6;
    --ink:#2E2620;
    --muted:#8A7F75;
    --hair:#EBE1D6;
    --shadow:0 1px 2px rgba(70,45,25,.04), 0 8px 24px rgba(70,45,25,.06);
    --radius:18px;
    --safe-top:env(safe-area-inset-top,0px);
    --safe-bot:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html{ margin:0; padding:0; color-scheme:light; min-height:100%; background:var(--bg); }
  body{
    margin:0; padding:0; color:var(--ink); background:var(--bg); min-height:100dvh;
    font-family:'Roboto',-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; -webkit-font-smoothing:antialiased;
    padding-bottom:calc(86px + var(--safe-bot));
    -webkit-user-select:none; user-select:none; overscroll-behavior:none;
  }
  body.modal-open{overflow:hidden;}
  button,input,select,textarea{font-family:inherit;}

  .appbar{
    position:sticky; top:0; z-index:35; background:var(--surface);
    border-bottom:1px solid var(--hair); padding:calc(var(--safe-top) + 11px) 16px 12px;
    box-shadow:0 1px 0 rgba(70,45,25,.02);
  }
  .appbar .inner{max-width:560px; margin:0 auto; text-align:center;}
  .brand{font-size:18px; font-weight:700; letter-spacing:-.3px; color:var(--ink);}
  .brand .kanji{color:var(--accent); font-size:22px; margin-right:8px; line-height:1;}
  .brand b{color:var(--accent); font-weight:700;}

  #app{max-width:560px; margin:0 auto; padding:14px 16px 16px; position:relative;}
  h1{font-size:25px; font-weight:700; letter-spacing:-.5px; margin:2px 0;}
  h2{font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:.8px; color:var(--muted); margin:24px 0 11px;}
  .sub{color:var(--muted); font-size:14px; margin:2px 0 0;}

  .card{ position:relative; background:var(--surface); border:1px solid var(--hair); border-radius:var(--radius);
    overflow:hidden; box-shadow:var(--shadow); }

  .monthbar{display:flex; align-items:center; justify-content:space-between; gap:8px;}
  .monthbar .mname{font-size:15px; font-weight:700; letter-spacing:.2px; flex:1; text-align:center; color:var(--ink);}
  .nav{width:38px; height:38px; flex:0 0 auto; border:1px solid var(--hair); background:var(--surface-2);
    border-radius:12px; color:var(--ink); font-size:18px; cursor:pointer;}
  .nav:active{transform:scale(.95);}

  .controls{display:flex; flex-direction:column; gap:10px; margin-top:12px;}
  .search{display:flex; align-items:center; gap:9px; padding:11px 14px; border-radius:14px;
    background:var(--surface-2); border:1px solid var(--hair);}
  .search input{flex:1; background:transparent; border:0; outline:0; color:var(--ink); font-size:15px;}
  .search input::placeholder{color:var(--muted);}
  .seg{display:flex; gap:5px; background:var(--surface-2); border:1px solid var(--hair); border-radius:14px; padding:4px;
    overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none;}
  .seg::-webkit-scrollbar{display:none;}
  .seg button{flex:0 0 auto; white-space:nowrap; border:0; background:transparent; color:var(--muted); font-size:13px; font-weight:600;
    padding:8px 13px; border-radius:10px; transition:.18s; cursor:pointer;}
  .seg button.on{background:var(--surface); color:var(--accent); box-shadow:0 1px 2px rgba(70,45,25,.10);}
  .chip{align-self:flex-start; display:inline-flex; align-items:center; gap:7px; border:1px solid var(--hair);
    background:var(--surface-2); color:var(--muted); font-size:13px; font-weight:600; padding:8px 13px; border-radius:999px; cursor:pointer;}
  .chip.on{color:var(--accent); border-color:rgba(224,137,47,.5); background:rgba(224,137,47,.12);}
  .chip .box{width:14px; height:14px; border-radius:5px; border:1.5px solid var(--muted);}
  .chip.on .box{border-color:var(--accent); background:var(--accent);}

  .peak{margin-top:14px; padding:14px 14px 12px; background:#FCEFDC; border-color:#F4DBB4;}
  .peak .ttl{font-size:12px; text-transform:uppercase; letter-spacing:.6px; color:var(--muted); font-weight:700; margin-bottom:10px;}
  .peak .ttl b{color:var(--accent);}
  .peakrow{display:flex; gap:9px; overflow-x:auto; -webkit-overflow-scrolling:touch; padding-bottom:2px;}
  .peakcard{flex:0 0 auto; display:flex; flex-direction:column; align-items:center; gap:5px; width:74px;
    padding:10px 6px; border-radius:14px; background:var(--surface); border:1px solid #F1D6AE; cursor:pointer;}
  .peakcard .pe{font-size:26px; line-height:1;}
  .peakcard .pn{font-size:11px; text-align:center; line-height:1.2; color:var(--ink);}

  .list{display:flex; flex-direction:column; gap:10px; margin-top:12px;}
  .item{display:flex; align-items:center; gap:13px; padding:13px 14px; cursor:pointer;}
  .item .emoji{font-size:28px; line-height:1; width:34px; text-align:center;}
  .item .body{flex:1; min-width:0;}
  .item .name{font-size:16px; font-weight:600; letter-spacing:-.2px; color:var(--ink); display:flex; align-items:baseline; gap:7px; flex-wrap:wrap;}
  .alt{font-size:12px; font-weight:500; color:var(--muted); letter-spacing:0;}
  .tag{font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.4px; padding:2px 7px; border-radius:999px;}
  .tag.fruit{color:var(--fruit); background:#E7F1FC;}
  .tag.leg{color:var(--leg); background:#E9F2E3;}
  .tag.champ{color:var(--champ); background:#F0EBE3;}
  .tag.oleo{color:var(--oleo); background:#F7EDD7;}
  .tag.divers{color:var(--divers); background:#F2E9F7;}
  .item .when{font-size:13px; color:var(--muted); margin-top:3px;}
  .dots{display:flex; gap:3px; margin-top:7px;}
  .dot{width:100%; height:6px; border-radius:3px; background:var(--s-off);}
  .dot.s1{background:var(--s-cons);}
  .dot.s2{background:var(--s-ext);}
  .dot.s3{background:var(--s-serre);}
  .dot.now{box-shadow:0 0 0 1.5px var(--surface), 0 0 0 3px rgba(46,38,32,.34);}
  .heart{flex:0 0 auto; width:34px; height:34px; border:0; background:transparent; color:var(--muted);
    font-size:19px; cursor:pointer; border-radius:50%;}
  .heart.on{color:var(--accent-2);}

  .empty{text-align:center; padding:34px 16px; color:var(--muted);}
  .empty .big{font-size:34px; margin-bottom:8px;}

  .calwrap{margin-top:12px; overflow-x:auto; -webkit-overflow-scrolling:touch; border-radius:var(--radius);}
  table.cal{border-collapse:separate; border-spacing:0; width:100%; min-width:660px; font-size:12px;}
  table.cal th,table.cal td{padding:0; text-align:center;}
  table.cal thead th{position:sticky; top:0; background:var(--surface); color:var(--muted); font-weight:600; padding:6px 2px 9px; font-size:11px;}
  table.cal thead th.col-now{color:var(--accent);}
  table.cal td.lbl,table.cal th.lbl{text-align:left; white-space:nowrap; padding:5px 12px 5px 2px; font-weight:600;
    position:sticky; left:0; background:var(--surface); box-shadow:1px 0 0 var(--hair); color:var(--ink); cursor:pointer;}
  table.cal td.lbl:active{color:var(--accent);}
  table.cal td.lbl .em{margin-right:6px;}
  .cell{height:18px; margin:2px; border-radius:5px; background:var(--s-off);}
  .cell.s1{background:var(--s-cons);}
  .cell.s2{background:var(--s-ext);}
  .cell.s3{background:var(--s-serre);}
  .cell.col-now{outline:1.5px solid var(--accent); outline-offset:-1px;}

  .legend{display:flex; gap:14px; flex-wrap:wrap; margin-top:14px; font-size:12.5px; color:var(--muted);}
  .legend .k{display:flex; align-items:center; gap:7px;}
  .legend .sw{width:16px; height:10px; border-radius:3px; border:1px solid rgba(0,0,0,.04);}

  .overlay{position:fixed; inset:0; z-index:60; display:none; flex-direction:column; background:var(--bg);}
  .overlay.open{display:flex; animation:fade .2s ease;}
  @keyframes fade{from{opacity:0;} to{opacity:1;}}
  .ohead{display:flex; align-items:center; gap:12px; padding:calc(var(--safe-top) + 12px) 16px 12px; border-bottom:1px solid var(--hair); background:var(--surface);}
  .ohead .x{width:38px; height:38px; border:1px solid var(--hair); background:var(--surface-2); color:var(--ink);
    border-radius:12px; font-size:17px; cursor:pointer; flex:0 0 auto;}
  .ohead .t{font-size:18px; font-weight:700; flex:1; display:flex; align-items:baseline; gap:8px; color:var(--ink);}
  .obody{flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:16px; max-width:560px; margin:0 auto; width:100%;}
  .field{padding:14px 15px; margin-bottom:11px;}
  .field .flabel{font-size:11px; text-transform:uppercase; letter-spacing:.6px; color:var(--muted); font-weight:600; display:flex; align-items:center; gap:6px; margin-bottom:7px;}
  .field .fval{font-size:14.5px; line-height:1.5; color:var(--ink);}
  .field .fval b{font-weight:700;}
  .field .fval + .fval{margin-top:9px;}
  .field.danger{border-color:#F1C9B9; background:#FCEEE9;}
  .field.danger .flabel{color:#C0512E;}
  .ok{color:var(--leg); font-weight:700;} .off{color:var(--muted);}
  .pill{font-size:11px; color:var(--muted); border:1px solid var(--hair); border-radius:999px; padding:3px 9px;}
  .miniyear{display:flex; gap:3px; margin-top:9px;}
  .miniyear .mc{flex:1; text-align:center; min-width:0;}
  .miniyear .ml{font-size:9px; color:var(--muted); margin-bottom:3px; letter-spacing:-.2px;}
  .miniyear .md{height:22px; border-radius:5px; background:var(--s-off);}
  .miniyear .md.s1{background:var(--s-cons);}
  .miniyear .md.s2{background:var(--s-ext);}
  .miniyear .md.s3{background:var(--s-serre);}
  .miniyear .mc.now .ml{color:var(--accent); font-weight:700;}
  .miniyear .mc.now .md{outline:1.5px solid var(--accent); outline-offset:-1px;}
  textarea.note-input{width:100%; min-height:84px; resize:vertical; background:var(--surface-2); border:1px solid var(--hair);
    color:var(--ink); border-radius:12px; padding:11px 12px; font-size:14.5px; line-height:1.5; outline:none;}
  textarea.note-input:focus{border-color:rgba(224,137,47,.55);}
  .savehint{font-size:11px; color:var(--muted); margin-top:6px; min-height:14px;}
  .linkrow{display:flex; gap:9px; flex-wrap:wrap;}
  .linkbtn{flex:1 1 130px; text-align:center; text-decoration:none; color:var(--ink); border:1px solid var(--hair);
    background:var(--surface-2); border-radius:12px; padding:11px 12px; font-size:13.5px; font-weight:600;}
  .linkbtn:active{transform:scale(.97);}

  .note{font-size:12.5px; color:var(--muted); line-height:1.55; padding:0 3px; margin-top:10px;}

  .tabs{position:fixed; left:0; right:0; bottom:0; z-index:40; padding:8px 14px calc(8px + var(--safe-bot));
    background:linear-gradient(180deg, rgba(251,247,242,0), rgba(251,247,242,.94) 45%);}
  .tabs .inner{max-width:560px; margin:0 auto; display:flex; gap:8px; background:var(--surface);
    border:1px solid var(--hair); border-radius:18px; padding:6px; box-shadow:0 6px 20px rgba(70,45,25,.10);}
  .tab{flex:1; border:0; background:transparent; color:var(--muted); border-radius:13px; padding:9px 4px;
    display:flex; flex-direction:column; align-items:center; gap:3px; font-size:10.5px; font-weight:600; cursor:pointer; transition:.2s;}
  .tab .ic{font-size:19px; line-height:1;}
  .tab.on{color:var(--accent); background:rgba(224,137,47,.13);}

  @keyframes tabin{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;}}
  .anim-in{animation:tabin .26s ease;}

  #toast{position:fixed; left:50%; bottom:calc(100px + var(--safe-bot)); transform:translateX(-50%) translateY(20px);
    background:var(--ink); color:#FBF7F2; padding:11px 18px; border-radius:14px;
    font-size:13.5px; opacity:0; pointer-events:none; transition:.25s; z-index:80; box-shadow:0 8px 24px rgba(0,0,0,.18);}
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  @media (prefers-reduced-motion: reduce){ *{animation:none !important; transition:none !important;} }
</style>
</head>
<body>

<header class="appbar"><div class="inner"><span class="brand"><span class="kanji">杏</span>edo<b>SeasonsTracker</b></span></div></header>

<div id="app"></div>

<div class="overlay" id="overlay">
  <div class="ohead">
    <button class="x" onclick="closeDetail()">✕</button>
    <div class="t" id="o-title"></div>
    <button class="heart" id="o-heart" onclick="toggleFavFromDetail()">♡</button>
  </div>
  <div class="obody" id="o-body"></div>
</div>

<nav class="tabs"><div class="inner">
  <button class="tab on" data-tab="now" onclick="switchTab('now')"><span class="ic">🌱</span>En ce moment</button>
  <button class="tab" data-tab="calendrier" onclick="switchTab('calendrier')"><span class="ic">🗓️</span>Calendrier</button>
  <button class="tab" data-tab="favoris" onclick="switchTab('favoris')"><span class="ic">♥</span>Favoris</button>
  <button class="tab" data-tab="reglages" onclick="switchTab('reglages')"><span class="ic">⚙︎</span>Réglages</button>
</div></nav>

<div id="toast"></div>

<script>
/* =========================================================
   edoSeasonsTracker v0.4 — saisonnalité Suisse
   fruits, légumes, champignons, oléagineux & divers.
   Saison (chaîne de 12 caractères, janv.→déc.) :
     0 = hors saison
     1 = conservation / disponible (stockage, forçage, culture continue)
     2 = de saison, culture en extérieur (frais local)
     3 = culture sous serre (Suisse, frais)
   ========================================================= */
const VERSION='0.4';
const MONTHS=['Jan','Fév','Mar','Avr','Mai','Juin','Juil','Aoû','Sep','Oct','Nov','Déc'];
const MONTHS_FULL=['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];

/* n=nom principal, alt=noms secondaires (option), t=type, e=emoji, s=saison(12),
   c=conservation, o=origine recommandée, a=hors saison locale (ou '—'),
   v=variétés (option), k=note (option), d=avertissement sécurité (option),
   w=titre Wikipédia (option), wl=langue Wikipédia (option, 'fr' par défaut) */
const DATA=[
 /* ---------- FRUITS ---------- */
 {n:'Abricot',t:'fruit',e:'🍑',s:'000000220000',c:'Mûrit à température ambiante ; au réfrigérateur (bac) une fois mûr, 2 à 3 jours. Se congèle dénoyauté.',o:'Suisse (Valais principalement), récolté à maturité, transport court.',a:'Hors saison locale (juillet–août), importé d\'Espagne, de France ou de l\'hémisphère sud, récolté avant maturité pour le transport.'},
 {n:'Pomme',t:'fruit',e:'🍎',s:'111100002211',c:'Endroit sombre et frais (0–5 °C, humidité élevée) ou bac du réfrigérateur, à l\'écart des autres fruits et légumes (dégage de l\'éthylène). La durée dépend de la variété.',o:'Suisse, disponible une grande partie de l\'année grâce au stockage.',a:'Hors stockage local, importée de l\'hémisphère sud (Nouvelle-Zélande, Chili).',v:'Gala (dès septembre), Golden, Braeburn et Boskoop (conservation d\'hiver), Maigold.'},
 {n:'Poire',t:'fruit',e:'🍐',s:'110000002211',c:'Mûrit à température ambiante, puis réfrigérateur. La chair cède près du pédoncule à maturité.',o:'Suisse à la récolte (automne) et en conservation jusqu\'en hiver.',a:'Hors saison locale, importée de l\'hémisphère sud.',v:'Williams (août–septembre), Conférence et Kaiser (automne, conservation).'},
 {n:'Fraise',t:'fruit',e:'🍓',s:'000022210000',c:'Réfrigérateur, non lavées, étalées ; à consommer sous 1 à 2 jours. Laver juste avant.',o:'Suisse, mai à juillet, récoltée à maturité.',a:'Hors saison locale, importée d\'Espagne et du Maroc (culture précoce sous abri, récolte avant maturité, transport long).'},
 {n:'Cerise',t:'fruit',e:'🍒',s:'000002200000',c:'Réfrigérateur, non équeutées, dans un récipient aéré.',o:'Suisse, juin–juillet.',a:'Hors saison locale, importée (Espagne, Turquie) ou de l\'hémisphère sud.'},
 {n:'Framboise',t:'fruit',e:'🫐',s:'000002222100',c:'Fragile : réfrigérateur, à plat, à consommer sous 1 à 2 jours. Se congèle telle quelle.',o:'Suisse, de l\'été au début de l\'automne (variétés remontantes).',a:'Hors saison locale, importée par transport rapide.'},
 {n:'Myrtille',t:'fruit',e:'🫐',s:'000000221000',c:'Réfrigérateur dans leur barquette, non lavées. Se congèlent telles quelles.',o:'Suisse (myrtille cultivée), juillet–août.',a:'Hors saison locale, importée (Espagne, Maroc, Amérique du Sud).'},
 {n:'Mûre',t:'fruit',e:'🫐',s:'000000022000',c:'Réfrigérateur, à plat, à consommer rapidement. Se congèle telle quelle.',o:'Suisse (cultivée ou cueillette), août–septembre.',a:'Hors saison locale, importée.',w:'Mûre (fruit)'},
 {n:'Groseille',t:'fruit',e:'🍇',s:'000002220000',c:'Réfrigérateur, non lavées, sous quelques jours. Se congèle telle quelle.',o:'Suisse, juin à août.',a:'Hors saison locale, peu importée.',w:'Groseille à grappes'},
 {n:'Cassis',t:'fruit',e:'🍇',s:'000002220000',c:'Réfrigérateur, non lavé, sous quelques jours. Se congèle tel quel.',o:'Suisse, juin à août.',a:'Hors saison locale, surtout transformé ou surgelé.',w:'Cassis (fruit)'},
 {n:'Raisin de table',t:'fruit',e:'🍇',s:'000000012210',c:'Réfrigérateur dans un sac perforé ; laver juste avant de consommer.',o:'Suisse (Valais, Tessin, Trois-Lacs) et Italie de saison, fin d\'été et automne.',a:'Hors saison locale, importé de l\'hémisphère sud en hiver et au printemps.',w:'Raisin'},
 {n:'Prune',t:'fruit',e:'🍑',s:'000000122000',c:'Mûrit à température ambiante, puis réfrigérateur. La pruine (voile blanc) indique la fraîcheur.',o:'Suisse, juillet à septembre.',a:'Hors saison locale, importée.'},
 {n:'Pruneau',t:'fruit',e:'🍑',s:'000000022100',c:'Mûrit à température ambiante, puis réfrigérateur. Se congèle dénoyauté.',o:'Suisse, août–septembre (pruneau Fellenberg notamment).',a:'Hors saison locale, importé.'},
 {n:'Pêche',t:'fruit',e:'🍑',s:'000001221000',c:'Mûrit à température ambiante ; réfrigérateur une fois mûre. Sensible au froid prolongé.',o:'Suisse (Valais, Tessin) en été ; sinon Italie ou France de saison.',a:'Hors saison locale, importée de l\'hémisphère sud, récoltée ferme.',w:'Pêche (fruit)'},
 {n:'Nectarine',t:'fruit',e:'🍑',s:'000001221000',c:'Mûrit à température ambiante ; réfrigérateur une fois mûre. Sensible au froid prolongé.',o:'Suisse (Valais, Tessin) en été ; sinon Italie ou France de saison.',a:'Hors saison locale, importée de l\'hémisphère sud, récoltée ferme.',w:'Nectarine'},
 {n:'Melon',t:'fruit',e:'🍈',s:'000000221000',c:'Entier à température ambiante pour finir de mûrir ; entamé, au réfrigérateur, filmé.',o:'Suisse (production limitée), Italie et France de saison en été.',a:'Hors saison locale, importé de loin (Amérique centrale, Maroc).'},

/* ---- État ---- */
let store={fav:[], comments:{}};
let curTab='now';
let curMonth=new Date().getMonth();
let curType='tous';
let localOnly=false;
let query='';
let detailIndex=null;
let commentTimer=null;

const CATS=[['tous','Tout'],['fruit','Fruits'],['légume','Légumes'],['champignon','Champignons'],['oleagineux','Oléagineux'],['autre','Divers']];

function load(){ try{ const r=localStorage.getItem('edoseasonstracker'); if(r){ const d=JSON.parse(r); store.fav=d.fav||[]; store.comments=d.comments||{}; } }catch(e){} }
function save(){ try{ localStorage.setItem('edoseasonstracker', JSON.stringify(store)); }catch(e){} }
load();

function isFav(n){ return store.fav.indexOf(n)!==-1; }
function toggleFav(n){ const i=store.fav.indexOf(n); if(i===-1){ store.fav.push(n);} else { store.fav.splice(i,1);} save(); }
function commentOf(n){ return store.comments[n]||''; }
function setComment(n,val){ if(val&&val.trim()){ store.comments[n]=val; } else { delete store.comments[n]; } save(); }

function seasonOf(it,m){ return parseInt(it.s[m],10); }
function tagClass(t){ return t==='fruit'?'fruit':t==='légume'?'leg':t==='champignon'?'champ':t==='oleagineux'?'oleo':'divers'; }
function tagLabel(t){ return t==='fruit'?'fruit':t==='légume'?'légume':t==='champignon'?'champignon':t==='oleagineux'?'oléagineux':'divers'; }
function statusText(it,m){
  const v=seasonOf(it,m);
  if(it.t==='autre') return v>=2?'Période d\'alpage':'Disponible toute l\'année';
  if(it.t==='champignon' && v===1) return 'Cultivé toute l\'année';
  return v===2?'De saison (culture en extérieur)' : v===3?'Culture sous serre' : v===1?'Disponible (conservation)' : 'Hors saison';
}
function peakMonths(it){
  for(const lvl of ['2','3','1']){ const out=[]; for(let m=0;m<12;m++){ if(it.s[m]===lvl) out.push(m); } if(out.length) return out; }
  return [];
}
function rangeText(it){
  const peak=peakMonths(it); if(peak.length===12) return 'toute l\'année'; if(!peak.length) return '—';
  const present=new Array(12).fill(false); peak.forEach(m=>present[m]=true);
  let starts=[]; for(let m=0;m<12;m++){ if(present[m]&&!present[(m+11)%12]) starts.push(m); }
  return starts.map(s=>{ let e=s; while(present[(e+1)%12]) e=(e+1)%12; return s===e?MONTHS_FULL[s]:MONTHS_FULL[s]+'–'+MONTHS_FULL[e]; }).join(', ');
}
function wikiUrl(it){ const lang=it.wl||'fr'; const title=it.w||it.n; return 'https://'+lang+'.wikipedia.org/wiki/'+encodeURIComponent(title.replace(/ /g,'_')); }
function imgUrl(it){ return 'https://www.google.com/search?tbm=isch&q='+encodeURIComponent(it.n); }
function altHtml(it){ return it.alt?`<span class="alt">${it.alt}</span>`:''; }

/* ---- Filtre / tri ---- */
function itemMatches(it){
  if(curType!=='tous' && it.t!==curType) return false;
  if(localOnly && seasonOf(it,curMonth)!==2) return false;
  if(query && (it.n+' '+(it.alt||'')).toLowerCase().indexOf(query.toLowerCase())===-1) return false;
  return true;
}
function sortedFor(month){
  return DATA.map((it,i)=>({it,i})).filter(o=>itemMatches(o.it))
    .sort((a,b)=> seasonOf(b.it,month)-seasonOf(a.it,month) || a.it.n.localeCompare(b.it.n,'fr'));
}
function availCount(){ return DATA.filter(it=>(curType==='tous'||it.t===curType)&&seasonOf(it,curMonth)>0).length; }

function segHtml(){ return `<div class="seg">`+CATS.map(c=>`<button data-cat="${c[0]}" class="${curType===c[0]?'on':''}" onclick="setType('${c[0]}')">${c[1]}</button>`).join('')+`</div>`; }

/* ---- Rendu ---- */
function render(){
  const app=document.getElementById('app');
  if(curTab==='now') app.innerHTML=renderNow();
  else if(curTab==='calendrier') app.innerHTML=renderCalendrier();
  else if(curTab==='favoris') app.innerHTML=renderFavoris();
  else app.innerHTML=renderReglages();
  bindSearch();
  if(curTab==='calendrier') centerCalendar();
}

function listHtml(){
  const list=sortedFor(curMonth);
  return list.length ? list.map(o=>itemRow(o.it,o.i)).join('')
    : `<div class="empty"><div class="big">🧺</div>Aucun produit ne correspond.</div>`;
}
function subText(){ const a=availCount(); return `${a} produit${a>1?'s':''} disponible${a>1?'s':''} en ${MONTHS_FULL[curMonth]} en Suisse`; }

function renderNow(){
  const now=new Date().getMonth();
  const isNow=curMonth===now;
  const mlabel=MONTHS_FULL[curMonth].charAt(0).toUpperCase()+MONTHS_FULL[curMonth].slice(1);

  let peakHtml='';
  if(isNow && !query && !localOnly){
    const peak=DATA.map((it,i)=>({it,i})).filter(o=>seasonOf(o.it,now)===2 && o.it.t!=='autre')
      .sort((a,b)=> peakMonths(a.it).length-peakMonths(b.it).length || a.it.n.localeCompare(b.it.n,'fr')).slice(0,6);
    if(peak.length){
      peakHtml=`<div class="card peak"><div class="ttl">Au pic <b>en ce moment</b></div>
        <div class="peakrow">${peak.map(o=>`<div class="peakcard" onclick="openDetail(${o.i})"><div class="pe">${o.it.e}</div><div class="pn">${o.it.n}</div></div>`).join('')}</div></div>`;
    }
  }

  return `<div class="screen">
    <h1>En ce moment</h1>
    <p class="sub" id="nowsub">${subText()}</p>
    <div class="card" style="margin-top:14px; padding:10px 12px">
      <div class="monthbar">
        <button class="nav" onclick="changeMonth(-1)" aria-label="Mois précédent">‹</button>
        <div class="mname">${mlabel}${isNow?' · mois en cours':''}</div>
        <button class="nav" onclick="changeMonth(1)" aria-label="Mois suivant">›</button>
      </div>
    </div>
    ${peakHtml}
    <div class="controls">
      <div class="search"><span>🔎</span><input id="q" placeholder="Rechercher un produit…" value="${query.replace(/"/g,'&quot;')}"></div>
      ${segHtml()}
      <button class="chip ${localOnly?'on':''}" onclick="toggleLocal()"><span class="box"></span>Frais local uniquement (culture en extérieur)</button>
    </div>
    <div class="list" id="list">${listHtml()}</div>
  </div>`;
}

function itemRow(it,i){
  const now=new Date().getMonth();
  const v=seasonOf(it,curMonth);
  const dots=Array.from({length:12},(_,m)=>{ const sv=it.s[m]; const cls=sv==='2'?'s2':sv==='3'?'s3':sv==='1'?'s1':''; return `<span class="dot ${cls} ${m===now?'now':''}"></span>`; }).join('');
  const dot=v===2?'●':v===3?'◆':v===1?'○':'·';
  return `<div class="card item" onclick="openDetail(${i})">
    <div class="emoji">${it.e}</div>
    <div class="body">
      <div class="name">${it.n}${altHtml(it)}<span class="tag ${tagClass(it.t)}">${tagLabel(it.t)}</span></div>
      <div class="when">${dot} ${statusText(it,curMonth)} · ${rangeText(it)}</div>
      <div class="dots">${dots}</div>
    </div>
    <button class="heart ${isFav(it.n)?'on':''}" onclick="event.stopPropagation(); quickFav('${escj(it.n)}', this)">${isFav(it.n)?'♥':'♡'}</button>
  </div>`;
}

function renderFavoris(){
  const favs=DATA.map((it,i)=>({it,i})).filter(o=>isFav(o.it.n));
  let html=`<div class="screen"><h1>Favoris</h1>`;
  if(!favs.length) return html+`<div class="empty"><div class="big">♡</div>Aucun favori pour l'instant.<br>Touche le cœur d'un produit pour l'ajouter ici.</div></div>`;
  html+=`<p class="sub">${favs.length} produit${favs.length>1?'s':''} suivi${favs.length>1?'s':''}</p><div class="list">`;
  html+=favs.sort((a,b)=>seasonOf(b.it,curMonth)-seasonOf(a.it,curMonth)||a.it.n.localeCompare(b.it.n,'fr')).map(o=>itemRow(o.it,o.i)).join('');
  return html+`</div></div>`;
}

function calRows(){ return DATA.filter(it=>curType==='tous'||it.t===curType).slice().sort((a,b)=>a.n.localeCompare(b.n,'fr')); }
function calBodyHtml(){
  const now=new Date().getMonth();
  return calRows().map(it=>{
    const idx=DATA.indexOf(it);
    const cells=Array.from({length:12},(_,m)=>{ const sv=it.s[m]; const cls=sv==='2'?'s2':sv==='3'?'s3':sv==='1'?'s1':''; return `<td><div class="cell ${cls} ${m===now?'col-now':''}"></div></td>`; }).join('');
    return `<tr><td class="lbl" onclick="openDetail(${idx})"><span class="em">${it.e}</span>${it.n}</td>${cells}</tr>`;
  }).join('');
}
function renderCalendrier(){
  const now=new Date().getMonth();
  const head=`<tr><th class="lbl"></th>`+MONTHS.map((m,i)=>`<th class="${i===now?'col-now':''}">${m}</th>`).join('')+`</tr>`;
  return `<div class="screen">
    <h1>Calendrier</h1>
    <p class="sub">Vue annuelle · le mois en cours est encadré · touche un nom pour ouvrir sa fiche</p>
    <div style="margin-top:14px">${segHtml()}</div>
    <div class="card calwrap" style="padding:12px 12px 14px"><table class="cal"><thead>${head}</thead><tbody id="calbody">${calBodyHtml()}</tbody></table></div>
    <div class="legend">
      <span class="k"><span class="sw" style="background:var(--s-ext)"></span>De saison (culture en extérieur)</span>
      <span class="k"><span class="sw" style="background:var(--s-serre)"></span>Culture sous serre</span>
      <span class="k"><span class="sw" style="background:var(--s-cons)"></span>Conservation / disponible</span>
      <span class="k"><span class="sw" style="background:var(--s-off)"></span>Hors saison</span>
    </div>
  </div>`;
}
function centerCalendar(){
  requestAnimationFrame(()=>{
    const wrap=document.querySelector('.calwrap'); if(!wrap) return;
    const col=wrap.querySelector('thead th.col-now'); if(!col) return;
    const wr=wrap.getBoundingClientRect(), cr=col.getBoundingClientRect();
    wrap.scrollLeft += (cr.left-wr.left) - wrap.clientWidth/2 + cr.width/2;
  });
}

function renderReglages(){
  return `<div class="screen">
    <h1>Réglages</h1>
    <h2>À propos</h2>
    <div class="card" style="padding:15px">
      <div style="font-weight:700; font-size:16px; color:var(--ink)"><span style="color:var(--accent); font-size:20px; margin-right:7px">杏</span>edo<b style="color:var(--accent)">SeasonsTracker</b> <span class="pill">v${VERSION}</span></div>
      <p class="note">Saisonnalité en Suisse des <b>fruits, légumes, champignons, oléagineux</b> et de produits courants (<b>lait, œufs, miel, huile d'olive</b>) : période sur l'année, mode de conservation et origine recommandée. Application de consultation ; favoris et commentaires sont enregistrés sur cet appareil.</p>
      <p class="note"><b>De saison, sous serre, conservation.</b> « De saison (culture en extérieur) » désigne la production locale de plein air ; « culture sous serre » la production suisse sous abri aux intersaisons ; « conservation » la disponibilité par stockage, forçage ou culture continue.</p>
      <p class="note"><b>Variétés.</b> Les fruits et légumes proches sont listés séparément, leurs autres noms apparaissant en petit à côté du nom principal. Chaque fiche propose un lien vers Wikipédia et une recherche Google Images.</p>
      <p class="note"><b>⚠️ Champignons.</b> Plusieurs champignons sauvages ressemblent à des espèces vénéneuses. Ne consommez que des champignons identifiés avec certitude ; en cas de doute, faites contrôler votre récolte par un contrôleur officiel des champignons (VAPKO). Certaines espèces, comme la morille, sont toxiques crues et doivent être bien cuites.</p>
      <p class="note"><b>Saison.</b> Calendrier indicatif basé sur la récolte et la disponibilité locales (sources : calendriers saisonniers suisses). Les dates réelles varient selon la météo, l'altitude et les variétés.</p>
    </div>
    <div style="height:8px"></div>
  </div>`;
}

/* ---- Détail ---- */
function openDetail(i){
  detailIndex=i; const it=DATA[i];
  document.getElementById('o-title').innerHTML=`<span style="font-size:24px">${it.e}</span> ${it.n}${altHtml(it)}`;
  const heart=document.getElementById('o-heart');
  heart.textContent=isFav(it.n)?'♥':'♡'; heart.classList.toggle('on',isFav(it.n));

  const now=new Date().getMonth();
  const year=Array.from({length:12},(_,m)=>{ const sv=it.s[m]; const cls=sv==='2'?'s2':sv==='3'?'s3':sv==='1'?'s1':''; return `<div class="mc ${m===now?'now':''}"><div class="ml">${MONTHS[m]}</div><div class="md ${cls}"></div></div>`; }).join('');

  const originBlock = it.t==='autre'
    ? `<div class="fval"><span class="ok">✓</span> ${it.o}</div>`
    : `<div class="fval"><span class="ok">✓</span> ${it.o}</div>${ (it.a&&it.a!=='—') ? `<div class="fval"><span class="off">○</span> Hors saison locale : ${it.a}</div>` : '' }`;

  document.getElementById('o-body').innerHTML=`
    <div class="card field">
      <div class="flabel">🗓️ Saison en Suisse</div>
      <div class="fval"><b>${statusText(it,now)}</b> · de saison : ${rangeText(it)}.</div>
      <div class="miniyear">${year}</div>
    </div>
    ${it.d?`<div class="card field danger"><div class="flabel">⚠️ Sécurité</div><div class="fval">${it.d}</div></div>`:''}
    <div class="card field">
      <div class="flabel">❄️ Conservation</div>
      <div class="fval">${it.c}</div>
    </div>
    <div class="card field">
      <div class="flabel">🌍 Origine recommandée pour le goût</div>
      ${originBlock}
    </div>
    ${it.v?`<div class="card field"><div class="flabel">🌾 Variétés &amp; micro-saisons</div><div class="fval">${it.v}</div></div>`:''}
    ${it.k?`<div class="card field"><div class="flabel">ℹ️ Bon à savoir</div><div class="fval">${it.k}</div></div>`:''}
    <div class="card field">
      <div class="flabel">🔗 Liens</div>
      <div class="linkrow">
        <a class="linkbtn" href="${wikiUrl(it)}" target="_blank" rel="noopener">Wikipédia${it.wl==='en'?' (en anglais)':''} ↗</a>
        <a class="linkbtn" href="${imgUrl(it)}" target="_blank" rel="noopener">Google Images ↗</a>
      </div>
    </div>
    <div class="card field">
      <div class="flabel">📝 Commentaires</div>
      <textarea class="note-input" id="commentInput" placeholder="Ajoute une note personnelle…" oninput="onComment(${i}, this.value)">${escapeHtml(commentOf(it.n))}</textarea>
      <div class="savehint" id="saveHint"></div>
    </div>
    <div style="height:24px"></div>`;
  document.getElementById('overlay').classList.add('open');
  document.body.classList.add('modal-open');
}
function closeDetail(){ document.getElementById('overlay').classList.remove('open'); document.body.classList.remove('modal-open'); detailIndex=null; if(curTab==='favoris') render(); }
function toggleFavFromDetail(){ if(detailIndex==null) return; const it=DATA[detailIndex]; toggleFav(it.n);
  const h=document.getElementById('o-heart'); h.textContent=isFav(it.n)?'♥':'♡'; h.classList.toggle('on',isFav(it.n));
  toast(isFav(it.n)?'Ajouté aux favoris ♥':'Retiré des favoris'); }
function onComment(i,val){ const it=DATA[i]; setComment(it.n,val);
  const h=document.getElementById('saveHint'); if(h){ h.textContent='Enregistré sur cet appareil ✓'; clearTimeout(commentTimer); commentTimer=setTimeout(()=>{ if(h) h.textContent=''; },1600); } }

/* ---- Animations / actions ---- */
function fadeSwap(el, html, after){
  if(!el){ return; }
  el.style.transition='opacity .15s ease, transform .15s ease';
  el.style.opacity='0'; el.style.transform='translateY(5px)';
  setTimeout(()=>{ el.innerHTML=html; el.style.opacity='1'; el.style.transform='none'; if(after) requestAnimationFrame(after); },140);
}
function quickFav(n,btn){ toggleFav(n); const on=isFav(n); btn.textContent=on?'♥':'♡'; btn.classList.toggle('on',on);
  if(curTab==='favoris') render(); toast(on?'Ajouté aux favoris ♥':'Retiré des favoris'); }
function changeMonth(d){ curMonth=(curMonth+d+12)%12; render(); }
function setType(t){
  curType=t;
  document.querySelectorAll('.seg button').forEach(b=>b.classList.toggle('on', b.dataset.cat===t));
  if(curTab==='now'){
    const sub=document.getElementById('nowsub'); if(sub) sub.textContent=subText();
    fadeSwap(document.getElementById('list'), listHtml());
  } else if(curTab==='calendrier'){
    fadeSwap(document.getElementById('calbody'), calBodyHtml(), centerCalendar);
  }
}
function toggleLocal(){
  localOnly=!localOnly;
  const c=document.querySelector('.chip'); if(c) c.classList.toggle('on',localOnly);
  fadeSwap(document.getElementById('list'), listHtml());
}

function bindSearch(){
  const q=document.getElementById('q');
  if(q){ q.addEventListener('input', e=>{ query=e.target.value;
    const listEl=document.getElementById('list'); if(listEl) listEl.innerHTML=listHtml();
  }); }
}

/* ---- Onglets : haut de page + mois réinitialisé ---- */
function switchTab(t){
  curTab=t; query=''; curMonth=new Date().getMonth();
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on', b.dataset.tab===t));
  render();
  window.scrollTo(0,0);
  const child=document.querySelector('#app > .screen');
  if(child){ child.classList.remove('anim-in'); void child.offsetWidth; child.classList.add('anim-in'); }
}

/* ---- Utils ---- */
function escj(s){ return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
function escapeHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
let toastTimer=null;
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),1900); }

if('serviceWorker' in navigator && location.protocol.indexOf('http')===0){
  window.addEventListener('load',()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); });
}

render();
</script>
</body>
</html>
