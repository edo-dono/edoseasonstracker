<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="edoSeasonsTracker">
<meta name="theme-color" content="#FBF7F2" id="themeColorMeta">
<meta name="description" content="Saisonnalité des fruits, légumes, champignons, oléagineux et produits suisses : période, conservation, origine et empreinte transport.">
<title>edoSeasonsTracker</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
<script>
  try{
    var st=(JSON.parse(localStorage.getItem('edoseasonstracker')||'{}').settings)||{};
    var th=st.theme||'auto';
    var mode=th==='auto'?(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light'):th;
    document.documentElement.setAttribute('data-theme',mode);
    if(st.cb) document.documentElement.setAttribute('data-cb','1');
  }catch(e){ document.documentElement.setAttribute('data-theme','light'); }
</script>
<style>
  :root{
    --accent:#E0892F; --accent-2:#D9663F;
    --s-ext:#F4A24A; --s-serre:#7CB36A; --s-cons:#F8D9B4; --s-off:#ECE4DA;
    --fruit:#2E7DD1; --leg:#4E8B3D; --champ:#7E7368; --divers:#9B6FB0; --oleo:#B5852F;
    --bg:#FBF7F2; --surface:#FFFFFF; --surface-2:#F4EEE6; --ink:#2E2620; --muted:#8A7F75; --hair:#EBE1D6;
    --shadow:0 1px 2px rgba(70,45,25,.04), 0 8px 24px rgba(70,45,25,.06);
    --toast-bg:#2E2620; --toast-fg:#FBF7F2;
    --radius:18px; --safe-top:env(safe-area-inset-top,0px); --safe-bot:env(safe-area-inset-bottom,0px);
  }
  html[data-theme="dark"]{
    --accent:#F2A24A; --accent-2:#E68057;
    --s-ext:#EE9F49; --s-serre:#73A85F; --s-cons:#6E4E2C; --s-off:#2C241D;
    --fruit:#74B6FF; --leg:#86C56E; --champ:#B4A99C; --divers:#C29BD6; --oleo:#D8B36A;
    --bg:#15100D; --surface:#201813; --surface-2:#2A211B; --ink:#F1E9E2; --muted:#A99C90; --hair:#352A22;
    --shadow:0 1px 2px rgba(0,0,0,.35), 0 10px 28px rgba(0,0,0,.45);
    --toast-bg:#F1E9E2; --toast-fg:#201813;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html{ margin:0; padding:0; min-height:100%; background:var(--bg); }
  body{ margin:0; padding:0; color:var(--ink); background:var(--bg); min-height:100dvh;
    font-family:'Roboto',-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; -webkit-font-smoothing:antialiased;
    padding-bottom:calc(86px + var(--safe-bot)); -webkit-user-select:none; user-select:none; overscroll-behavior:none;
    transition:background .25s ease, color .25s ease;}
  body.modal-open{overflow:hidden;}
  button,input,select,textarea{font-family:inherit;}
  .appbar{ position:sticky; top:0; z-index:35; background:var(--surface); border-bottom:1px solid var(--hair);
    padding:calc(var(--safe-top) + 11px) 16px 12px;}
  .appbar .inner{max-width:560px; margin:0 auto; text-align:center;}
  .brand{font-size:18px; font-weight:700; letter-spacing:-.3px; color:var(--ink);}
  .brand .kanji{color:var(--accent); font-size:22px; margin-right:8px; line-height:1;}
  .brand b{color:var(--accent); font-weight:700;}
  #app{max-width:560px; margin:0 auto; padding:14px 16px 16px; position:relative;}
  h1{font-size:25px; font-weight:700; letter-spacing:-.5px; margin:2px 0;}
  h2{font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:.8px; color:var(--muted); margin:22px 0 11px;}
  .sub{color:var(--muted); font-size:14px; margin:2px 0 0;}
  .card{ position:relative; background:var(--surface); border:1px solid var(--hair); border-radius:var(--radius);
    overflow:hidden; box-shadow:var(--shadow);}
  .monthbar{display:flex; align-items:center; justify-content:space-between; gap:8px;}
  .monthbar .mname{font-size:15px; font-weight:700; flex:1; text-align:center; color:var(--ink);}
  .nav{width:38px; height:38px; flex:0 0 auto; border:1px solid var(--hair); background:var(--surface-2);
    border-radius:12px; color:var(--ink); font-size:18px; cursor:pointer; transition:transform .12s;}
  .nav:active{transform:scale(.9);}
  .controls{display:flex; flex-direction:column; gap:10px; margin-top:12px;}
  .search{display:flex; align-items:center; gap:9px; padding:11px 14px; border-radius:14px; background:var(--surface-2); border:1px solid var(--hair);}
  .search input{flex:1; background:transparent; border:0; outline:0; color:var(--ink); font-size:15px;}
  .search input::placeholder{color:var(--muted);}
  .seg{display:flex; gap:5px; background:var(--surface-2); border:1px solid var(--hair); border-radius:14px; padding:4px;
    overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none;}
  .seg::-webkit-scrollbar{display:none;}
  .seg button{flex:0 0 auto; white-space:nowrap; border:0; background:transparent; color:var(--muted); font-size:13px; font-weight:600;
    padding:8px 12px; border-radius:10px; transition:.18s; cursor:pointer; display:inline-flex; gap:5px; align-items:center;}
  .seg button.on{background:var(--surface); color:var(--accent); box-shadow:0 1px 2px rgba(70,45,25,.12);}
  .seg button .ci{font-size:14px;}
  .chip{align-self:flex-start; display:inline-flex; align-items:center; gap:7px; border:1px solid var(--hair);
    background:var(--surface-2); color:var(--muted); font-size:13px; font-weight:600; padding:8px 13px; border-radius:999px; cursor:pointer; transition:.18s;}
  .chip.on{color:var(--accent); border-color:rgba(224,137,47,.5); background:rgba(224,137,47,.12);}
  .chip .box{width:14px; height:14px; border-radius:5px; border:1.5px solid var(--muted); transition:.18s;}
  .chip.on .box{border-color:var(--accent); background:var(--accent);}
  .peak{margin-top:14px; padding:14px 14px 12px; background:rgba(244,162,74,.10); border-color:rgba(244,162,74,.32);}
  .peak .ttl{font-size:12px; text-transform:uppercase; letter-spacing:.6px; color:var(--muted); font-weight:700; margin-bottom:10px;}
  .peak .ttl b{color:var(--accent);}
  .peakrow{display:flex; gap:9px; overflow-x:auto; -webkit-overflow-scrolling:touch; padding-bottom:2px;}
  .peakcard{flex:0 0 auto; display:flex; flex-direction:column; align-items:center; gap:5px; width:74px;
    padding:10px 6px; border-radius:14px; background:var(--surface); border:1px solid rgba(224,137,47,.32); cursor:pointer; transition:transform .12s;}
  .peakcard:active{transform:scale(.95);}
  .peakcard .pe{font-size:26px; line-height:1;}
  .peakcard .pn{font-size:11px; text-align:center; line-height:1.2; color:var(--ink);}
  .list{display:flex; flex-direction:column; gap:10px; margin-top:12px;}
  .item{display:flex; align-items:center; gap:13px; padding:13px 14px; cursor:pointer; transition:transform .12s;}
  .item:active{transform:scale(.99);}
  .item .emoji{font-size:28px; line-height:1; width:34px; text-align:center;}
  .item .body{flex:1; min-width:0;}
  .item .name{font-size:16px; font-weight:600; letter-spacing:-.2px; color:var(--ink); display:flex; align-items:baseline; gap:7px; flex-wrap:wrap;}
  .alt{font-size:12px; font-weight:500; color:var(--muted); letter-spacing:0;}
  .tag{font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.4px; padding:2px 7px; border-radius:999px;}
  .tag.fruit{color:var(--fruit); background:rgba(46,125,209,.15);}
  .tag.leg{color:var(--leg); background:rgba(78,139,61,.17);}
  .tag.champ{color:var(--champ); background:rgba(126,115,104,.20);}
  .tag.oleo{color:var(--oleo); background:rgba(181,133,47,.18);}
  .tag.divers{color:var(--divers); background:rgba(155,111,176,.18);}
  .badge{position:absolute; top:0; right:0; z-index:2; font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.3px; padding:3px 10px 4px; border-radius:0 var(--radius) 0 10px;}
  .badge.soon{background:var(--accent); color:#FFF8F0;}
  .badge.last{background:var(--accent-2); color:#FFF8F0;}
  .item .when{font-size:13px; color:var(--muted); margin-top:3px; display:flex; align-items:center; gap:6px; flex-wrap:wrap;}
  .tr{font-size:11px; font-weight:600; padding:1px 7px; border-radius:999px; display:inline-flex; gap:3px; align-items:center;}
  .tr-fresh,.tr-storage{color:var(--leg); background:rgba(78,139,61,.15);}
  .tr-near{color:var(--oleo); background:rgba(181,133,47,.17);}
  .tr-far{color:var(--accent-2); background:rgba(217,102,63,.15);}
  .dots{display:flex; gap:3px; margin-top:7px;}
  .dot{width:100%; height:6px; border-radius:3px; background:var(--s-off);}
  .dot.s1{background:var(--s-cons);} .dot.s2{background:var(--s-ext);} .dot.s3{background:var(--s-serre);}
  .dot.now{box-shadow:0 0 0 1.5px var(--surface), 0 0 0 3px rgba(127,99,80,.5);}
  .heart{flex:0 0 auto; width:34px; height:34px; border:0; background:transparent; color:var(--muted); font-size:19px; cursor:pointer; border-radius:50%;}
  .heart.on{color:var(--accent-2);}
  .heart.pop{animation:pop .35s ease;}
  @keyframes pop{0%{transform:scale(1);}30%{transform:scale(1.4);}60%{transform:scale(.9);}100%{transform:scale(1);}}
  .empty{text-align:center; padding:34px 16px; color:var(--muted);}
  .empty .big{font-size:34px; margin-bottom:8px;}
  .calwrap{margin-top:12px; overflow-x:auto; -webkit-overflow-scrolling:touch; border-radius:var(--radius);}
  table.cal{border-collapse:separate; border-spacing:0; width:100%; font-size:12px;}
  table.cal th,table.cal td{padding:0; text-align:center;}
  table.cal thead th{position:sticky; top:0; background:var(--surface); color:var(--muted); font-weight:600; padding:6px 2px 9px; font-size:11px;}
  table.cal thead th.col-now{color:var(--accent);}
  table.cal td.lbl,table.cal th.lbl{text-align:left; white-space:nowrap; padding:5px 12px 5px 2px; font-weight:600;
    position:sticky; left:0; background:var(--surface); box-shadow:1px 0 0 var(--hair); color:var(--ink); cursor:pointer;}
  table.cal td.lbl:active{color:var(--accent);}
  table.cal td.lbl .em{margin-right:6px;}
  .cell{position:relative; height:18px; margin:2px; border-radius:5px; background:var(--s-off);}
  .cell.s1{background:var(--s-cons);} .cell.s2{background:var(--s-ext);} .cell.s3{background:var(--s-serre);}
  .cell.col-now{outline:1.5px solid var(--accent); outline-offset:-1px;}
  .cl{display:none;}
  .legend{display:flex; gap:14px; flex-wrap:wrap; margin-top:14px; font-size:12.5px; color:var(--muted);}
  .legend .k{display:flex; align-items:center; gap:7px;}
  .legend .sw{width:18px; height:11px; border-radius:3px; border:1px solid rgba(0,0,0,.05); display:flex; align-items:center; justify-content:center; font-size:8px; font-weight:700; color:rgba(0,0,0,.5);}
  html[data-cb="1"] .cell .cl{display:flex; align-items:center; justify-content:center; height:100%; font-size:9px; font-weight:700; color:rgba(0,0,0,.6);}
  html[data-cb="1"] .miniyear .md .cl{display:flex; align-items:center; justify-content:center; height:100%; font-size:10px; font-weight:700; color:rgba(0,0,0,.55);}
  html[data-theme="dark"][data-cb="1"] .cell .cl, html[data-theme="dark"][data-cb="1"] .miniyear .md .cl{color:rgba(255,255,255,.7);}
  html[data-cb="1"] .cell.s3, html[data-cb="1"] .miniyear .md.s3{background-image:repeating-linear-gradient(45deg, rgba(0,0,0,.18) 0 2px, transparent 2px 5px);}
  html[data-cb="1"] .cell.s1, html[data-cb="1"] .miniyear .md.s1{background-image:radial-gradient(rgba(0,0,0,.20) 1px, transparent 1.4px); background-size:5px 5px;}
  html[data-cb="1"] .legend .sw .cl{display:block;}
  .overlay{position:fixed; inset:0; z-index:60; display:none; flex-direction:column; background:var(--bg);}
  .overlay.open{display:flex; animation:overlayIn .28s cubic-bezier(.2,.8,.2,1);}
  @keyframes overlayIn{from{opacity:0; transform:translateY(40px);} to{opacity:1; transform:none;}}
  .ohead{display:flex; align-items:center; gap:12px; padding:calc(var(--safe-top) + 12px) 16px 12px; border-bottom:1px solid var(--hair); background:var(--surface);}
  .ohead .x{width:38px; height:38px; border:1px solid var(--hair); background:var(--surface-2); color:var(--ink); border-radius:12px; font-size:17px; cursor:pointer; flex:0 0 auto;}
  .ohead .t{font-size:18px; font-weight:700; flex:1; display:flex; align-items:baseline; gap:8px; color:var(--ink);}
  .obody{flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:16px; max-width:560px; margin:0 auto; width:100%;}
  .trans-note{font-size:12px; color:var(--muted); background:var(--surface-2); border:1px solid var(--hair); border-radius:12px; padding:9px 12px; margin-bottom:11px;}
  .field{padding:14px 15px; margin-bottom:11px;}
  .field .flabel{font-size:11px; text-transform:uppercase; letter-spacing:.6px; color:var(--muted); font-weight:600; display:flex; align-items:center; gap:6px; margin-bottom:7px;}
  .field .fval{font-size:14.5px; line-height:1.5; color:var(--ink);}
  .field .fval b{font-weight:700;}
  .field .fval + .fval{margin-top:7px;}
  .field .src{font-size:11.5px; color:var(--muted); margin-top:9px; line-height:1.45;}
  .field .src a{color:var(--muted);}
  .field.danger{border-color:rgba(217,102,63,.45); background:rgba(217,102,63,.10);}
  .field.danger .flabel{color:var(--accent-2);}
  .trbig{font-size:14px; font-weight:700; padding:3px 10px; border-radius:999px; display:inline-flex; gap:5px; align-items:center;}
  .ok{color:var(--leg); font-weight:700;} .off{color:var(--muted);}
  .pill{font-size:11px; color:var(--muted); border:1px solid var(--hair); border-radius:999px; padding:3px 9px;}
  .miniyear{display:flex; gap:3px; margin-top:9px;}
  .miniyear .mc{flex:1; text-align:center; min-width:0;}
  .miniyear .ml{font-size:9px; color:var(--muted); margin-bottom:3px; letter-spacing:-.2px;}
  .miniyear .md{position:relative; height:22px; border-radius:5px; background:var(--s-off);}
  .miniyear .md.s1{background:var(--s-cons);} .miniyear .md.s2{background:var(--s-ext);} .miniyear .md.s3{background:var(--s-serre);}
  .miniyear .mc.now .ml{color:var(--accent); font-weight:700;}
  .miniyear .mc.now .md{outline:1.5px solid var(--accent); outline-offset:-1px;}
  textarea.note-input{width:100%; min-height:84px; resize:vertical; background:var(--surface-2); border:1px solid var(--hair);
    color:var(--ink); border-radius:12px; padding:11px 12px; font-size:14.5px; line-height:1.5; outline:none;}
  textarea.note-input:focus{border-color:rgba(224,137,47,.55);}
  .savehint{font-size:11px; color:var(--muted); margin-top:6px; min-height:14px;}
  .linkrow{display:flex; gap:9px; flex-wrap:wrap;}
  .linkbtn{flex:1 1 130px; text-align:center; text-decoration:none; color:var(--ink); border:1px solid var(--hair);
    background:var(--surface-2); border-radius:12px; padding:11px 12px; font-size:13.5px; font-weight:600; transition:transform .12s;}
  .linkbtn:active{transform:scale(.97);}
  .setrow{display:flex; gap:8px; flex-wrap:wrap;}
  .optbtn{flex:1 1 0; min-width:84px; border:1px solid var(--hair); background:var(--surface-2); color:var(--muted);
    font-size:14px; font-weight:600; padding:11px 10px; border-radius:12px; cursor:pointer; transition:.16s;}
  .optbtn.on{background:rgba(224,137,47,.13); color:var(--accent); border-color:rgba(224,137,47,.5);}
  .sel{background:var(--surface-2); border:1px solid var(--hair); color:var(--ink); border-radius:10px; padding:9px 10px; font-size:14px; outline:none;}
  .togglerow{display:flex; align-items:center; justify-content:space-between; gap:12px;}
  .switch{width:46px; height:28px; border-radius:999px; background:var(--surface-2); border:1px solid var(--hair); position:relative; cursor:pointer; flex:0 0 auto; transition:.2s;}
  .switch .kn{position:absolute; top:2px; left:2px; width:22px; height:22px; border-radius:50%; background:#fff; box-shadow:0 1px 3px rgba(0,0,0,.25); transition:.2s;}
  .switch.on{background:var(--accent); border-color:var(--accent);}
  .switch.on .kn{left:21px;}
  .note{font-size:12.5px; color:var(--muted); line-height:1.55; padding:0 2px; margin-top:10px;}
  .tabs{position:fixed; left:0; right:0; bottom:0; z-index:40; padding:8px 14px calc(8px + var(--safe-bot));
    background:linear-gradient(180deg, transparent, var(--bg) 45%);}
  .tabs .inner{max-width:560px; margin:0 auto; display:flex; gap:8px; background:var(--surface);
    border:1px solid var(--hair); border-radius:18px; padding:6px; box-shadow:0 6px 20px rgba(70,45,25,.12);}
  .tab{flex:1; border:0; background:transparent; color:var(--muted); border-radius:13px; padding:9px 4px;
    display:flex; flex-direction:column; align-items:center; gap:3px; font-size:10.5px; font-weight:600; cursor:pointer; transition:.2s;}
  .tab .ic{font-size:19px; line-height:1;}
  .tab.on{color:var(--accent); background:rgba(224,137,47,.13);}
  @keyframes tabin{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;}}
  .anim-in{animation:tabin .26s ease;}
  #toast{position:fixed; left:50%; bottom:calc(100px + var(--safe-bot)); transform:translateX(-50%) translateY(20px);
    background:var(--toast-bg); color:var(--toast-fg); padding:11px 18px; border-radius:14px; font-size:13.5px;
    opacity:0; pointer-events:none; transition:.25s; z-index:80; box-shadow:0 8px 24px rgba(0,0,0,.2); max-width:90%; text-align:center;}
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  @media (prefers-reduced-motion: reduce){ *{animation:none !important; transition:none !important;} }
</style>
</head>
<body>
<header class="appbar"><div class="inner"><span class="brand"><span class="kanji">杏</span>edo<b>SeasonsTracker</b></span></div></header>
<div id="app"></div>
<div class="overlay" id="overlay">
  <div class="ohead">
    <button class="x" onclick="closeDetail()">✕</button>
    <div class="t" id="o-title"></div>
    <button class="heart" id="o-heart" onclick="toggleFavFromDetail(this)">♡</button>
  </div>
  <div class="obody" id="o-body"></div>
</div>
<nav class="tabs"><div class="inner">
  <button class="tab on" data-tab="now" onclick="switchTab('now')"><span class="ic">🌱</span><span class="tl" data-t="tab_now"></span></button>
  <button class="tab" data-tab="calendrier" onclick="switchTab('calendrier')"><span class="ic">🗓️</span><span class="tl" data-t="tab_cal"></span></button>
  <button class="tab" data-tab="favoris" onclick="switchTab('favoris')"><span class="ic">♥</span><span class="tl" data-t="tab_fav"></span></button>
  <button class="tab" data-tab="reglages" onclick="switchTab('reglages')"><span class="ic">⚙︎</span><span class="tl" data-t="tab_set"></span></button>
</div></nav>
<input type="file" id="importFile" accept="application/json,.json" style="display:none" onchange="onImportFile(event)">
<div id="toast"></div>
<script>
const VERSION='0.6';
const LMONTHS={
  fr:['Jan','Fév','Mar','Avr','Mai','Juin','Juil','Aoû','Sep','Oct','Nov','Déc'],
  de:['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'],
  it:['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic']
};
const LMONTHS_FULL={
  fr:['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'],
  de:['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'],
  it:['gennaio','febbraio','marzo','aprile','maggio','giugno','luglio','agosto','settembre','ottobre','novembre','dicembre']
};
const I18N={
 fr:{tab_now:'En ce moment',tab_cal:'Calendrier',tab_fav:'Favoris',tab_set:'Réglages',
  now_title:'En ce moment',month_current:'mois en cours',search_ph:'Rechercher un produit…',
  cat_all:'Tout',cat_fruit:'Fruits',cat_veg:'Légumes',cat_mush:'Champignons',cat_oil:'Oléagineux',cat_misc:'Divers',
  chip_local:'Frais local uniquement (culture en extérieur)',peak_a:'Au pic',peak_b:'en ce moment',
  badge_soon:'Bientôt',badge_last:'Dernière chance',

 "Coing":{de:{c:"Keller oder Kühlschrank, getrennt von anderem Obst (starker Duft); hält mehrere Wochen.",o:"Schweiz, Oktober–November.",k:"Nicht roh essbar: wird gekocht (Gelee, Quittenpaste, im Ofen)."},it:{c:"Cantina o frigorifero, lontano dalla frutta (profumo intenso); si conserva diverse settimane.",o:"Svizzera, ottobre–novembre.",k:"Non si consuma crudo: si cucina (gelatina, cotognata, al forno)."}},
 "Rhubarbe":{de:{c:"Kühlschrank, Stangen in ein feuchtes Tuch gewickelt. In Stücken einfrierbar.",o:"Schweiz, April bis Juni.",a:"importiert.",k:"Botanisch ein Gemüse, wird wie Obst verwendet. Nur die Stange ist essbar: die Blätter sind oxalsäurereich und giftig."},it:{c:"Frigorifero, gambi avvolti in un panno umido. Si congela a pezzi.",o:"Svizzera, da aprile a giugno.",a:"importato.",k:"Botanicamente un ortaggio, consumato come frutta. Solo il gambo è commestibile: le foglie, ricche di acido ossalico, sono tossiche."}},
 "Châtaigne":{de:{c:"Kühlschrank im perforierten Beutel oder kühl und luftig. Roh oder gekocht einfrierbar.",o:"Schweiz (Tessin, Wallis), Oktober–November.",a:"importiert (Italien, Spanien, Frankreich).",k:"Grosse Auslesefrüchte heissen in der Küche «Maroni» (nicht mit der ungeniessbaren Rosskastanie verwechseln)."},it:{c:"Frigorifero nel sacchetto forato, o luogo fresco e areato. Si congela cruda o cotta.",o:"Svizzera (Ticino, Vallese), ottobre–novembre.",a:"importata (Italia, Spagna, Francia).",k:"I frutti grossi selezionati si chiamano «marroni» in cucina (da non confondere con l'ippocastano, non commestibile)."}},
 "Tomate":{de:{c:"Bei Raumtemperatur, nie im Kühlschrank (Kälte schadet Textur und Aroma). Vor direkter Sonne schützen.",o:"Schweiz, Freiland von Juli bis September; in der Schweiz im Gewächshaus in den Zwischensaisons.",a:"importiert (Spanien, Niederlande) aus dem beheizten Gewächshaus."},it:{c:"A temperatura ambiente, mai in frigorifero (il freddo altera consistenza e aromi). Al riparo dal sole diretto.",o:"Svizzera, pieno campo da luglio a settembre; in serra in Svizzera nelle mezze stagioni.",a:"importato (Spagna, Paesi Bassi) da serra riscaldata."}},
 "Courgette":{de:{c:"Gemüsefach des Kühlschranks, innert 5–7 Tagen. Gekocht einfrierbar.",o:"Schweiz, im Sommer im Freiland; im Gewächshaus in den Zwischensaisons.",a:"importiert."},it:{c:"Cassetto verdura del frigorifero, entro 5–7 giorni. Si congela cotta.",o:"Svizzera, in pieno campo in estate; in serra nelle mezze stagioni.",a:"importata."}},
 "Carotte":{de:{c:"Kühlschrank ohne Grün (das die Austrocknung beschleunigt), im Beutel. Lange haltbar.",o:"Schweiz, frisch im Sommer–Herbst und ganzjährig aus dem Lager.",a:""},it:{c:"Frigorifero senza le foglie (che accelerano la disidratazione), in un sacchetto. Lunga conservazione.",o:"Svizzera, fresca in estate–autunno e tutto l'anno in conservazione.",a:""}},
 "Pomme de terre":{de:{c:"Dunkel, kühl, trocken und luftig; nie im Kühlschrank (Kälte wandelt Stärke in Zucker um). Vor Licht schützen (Ergrünen).",o:"Schweiz, Ernte Sommer–Herbst, ganzjährig aus dem Lager.",a:"",v:"Frühkartoffeln (Juni–Juli), Lagersorten (Herbst, Lager)."},it:{c:"Luogo buio, fresco, asciutto e areato; mai in frigorifero (il freddo trasforma l'amido in zucchero). Al riparo dalla luce (inverdimento).",o:"Svizzera, raccolta estate–autunno, disponibile tutto l'anno in conservazione.",a:"",v:"Patate novelle (giugno–luglio), varietà da serbo (autunno, conservazione)."}},
 "Poireau":{de:{c:"Kühlschrank, stehend oder eingewickelt. Der Winterlauch erträgt Frost auf dem Feld.",o:"Schweiz, Herbst und Winter.",a:""},it:{c:"Frigorifero, in piedi o avvolto. Il porro invernale resiste al gelo in campo.",o:"Svizzera, autunno e inverno.",a:""}},
 "Chou blanc":{de:{c:"Kühlschrank oder kühler Keller; ein ganzer Kohl hält mehrere Wochen.",o:"Schweiz, Herbst und Winter (Ernte und Lagerung).",a:""},it:{c:"Frigorifero o cantina fresca; un cavolo intero si conserva diverse settimane.",o:"Svizzera, autunno e inverno (raccolta e conservazione).",a:""}},
 "Chou rouge":{de:{c:"Kühlschrank oder kühler Keller; hält mehrere Wochen.",o:"Schweiz, Herbst und Winter (Ernte und Lagerung).",a:""},it:{c:"Frigorifero o cantina fresca; si conserva diverse settimane.",o:"Svizzera, autunno e inverno (raccolta e conservazione).",a:""}},
 "Chou frisé":{de:{c:"Kühlschrank, einige Tage. Frost auf dem Feld macht ihn milder.",o:"Schweiz, Spätherbst und Winter.",a:""},it:{c:"Frigorifero, pochi giorni. Il gelo in campo addolcisce il gusto.",o:"Svizzera, tardo autunno e inverno.",a:""}},
 "Chou de Bruxelles":{de:{c:"Kühlschrank, möglichst am Stiel, einige Tage.",o:"Schweiz, Spätherbst und Winter; Frost macht milder.",a:""},it:{c:"Frigorifero, possibilmente sul gambo, pochi giorni.",o:"Svizzera, tardo autunno e inverno; il gelo addolcisce.",a:""}},
 "Chou-fleur":{de:{c:"Kühlschrank, 4–5 Tage, Kopf nach unten gegen Feuchtigkeit.",o:"Schweiz, Mai bis November.",a:"importiert (Frankreich, Spanien, Italien)."},it:{c:"Frigorifero, 4–5 giorni, testa verso il basso per limitare l'umidità.",o:"Svizzera, da maggio a novembre.",a:"importato (Francia, Spagna, Italia)."}},
 "Chou-rave":{de:{c:"Kühlschrank ohne Blätter, im Beutel.",o:"Schweiz, Mai bis Oktober.",a:""},it:{c:"Frigorifero senza foglie, in un sacchetto.",o:"Svizzera, da maggio a ottobre.",a:""}},
 "Brocoli":{de:{c:"Kühlschrank im perforierten Beutel, einige Tage. Blanchiert einfrierbar.",o:"Schweiz, Juni bis Oktober.",a:"importiert (Spanien, Italien), teils per Flugzeug."},it:{c:"Frigorifero nel sacchetto forato, pochi giorni. Si congela sbollentato.",o:"Svizzera, da giugno a ottobre.",a:"importato (Spagna, Italia), a volte in aereo."}},
 "Épinard":{de:{c:"Kühlschrank, innert 1–2 Tagen verzehren. Blanchiert einfrierbar.",o:"Schweiz, Frühling (April–Mai) und Herbst (September–Oktober).",a:"importiert."},it:{c:"Frigorifero, consumare entro 1–2 giorni. Si congela sbollentato.",o:"Svizzera, primavera (aprile–maggio) e autunno (settembre–ottobre).",a:"importato."}},
 "Laitue":{de:{c:"Kühlschrank, in ein feuchtes Tuch gewickelt. Erst vor dem Verzehr waschen.",o:"Schweiz, Freiland von April bis Oktober; Gewächshaus in den Zwischensaisons.",a:"importiert (lange Transportwege)."},it:{c:"Frigorifero, avvolta in un panno umido. Lavare solo prima di consumare.",o:"Svizzera, pieno campo da aprile a ottobre; serra nelle mezze stagioni.",a:"importata (lungo trasporto)."}},
 "Mâche":{de:{c:"Kühlschrank, empfindlich, innert 1–2 Tagen.",o:"Schweiz, Salat der kalten Jahreszeit (Herbst–Winter).",a:""},it:{c:"Frigorifero, delicata, entro 1–2 giorni.",o:"Svizzera, insalata della stagione fredda (autunno–inverno).",a:""}},
 "Roquette":{de:{c:"Kühlschrank, im Beutel, einige Tage. Erst vor dem Verzehr waschen.",o:"Schweiz, April bis Oktober.",a:"importiert."},it:{c:"Frigorifero, in un sacchetto, pochi giorni. Lavare solo prima.",o:"Svizzera, da aprile a ottobre.",a:"importata."}},
 "Courge":{de:{c:"Ganz: kühl, trocken und luftig (nicht im Kühlschrank), haltbar von mehreren Wochen bis Monaten.",o:"Schweiz, Ernte im Herbst, Lager bis in den Winter.",v:"Butternut, Spaghettikürbis, Muskat usw. (Herbsternte, lange haltbar)."},it:{c:"Intera: luogo fresco, asciutto e areato (non in frigorifero), da diverse settimane a qualche mese.",o:"Svizzera, raccolta in autunno, conservazione fino all'inverno.",v:"Butternut, zucca spaghetti, moscata, ecc. (raccolta autunno, lunga conservazione)."}},
 "Potiron":{de:{c:"Ganz: kühl, trocken und luftig; haltbar von mehreren Wochen bis Monaten.",o:"Schweiz, Ernte im Herbst, Lager bis in den Winter.",a:""},it:{c:"Intero: luogo fresco, asciutto e areato; da diverse settimane a qualche mese.",o:"Svizzera, raccolta in autunno, conservazione fino all'inverno.",a:""}},
 "Oignon":{de:{c:"Dunkel, trocken und luftig, ausserhalb des Kühlschranks, getrennt von Kartoffeln.",o:"Schweiz, Ernte Spätsommer, ganzjährig aus dem Lager.",a:""},it:{c:"Luogo buio, asciutto e areato, fuori dal frigorifero, lontano dalle patate.",o:"Svizzera, raccolta fine estate, disponibile tutto l'anno in conservazione.",a:""}},
 "Ail":{de:{c:"Trocken, luftig und schattig; nie im Kühlschrank (keimt und wird weich).",o:"Schweiz, Sommerernte, lange haltbar.",a:"importiert (Spanien, China), lange Transportwege."},it:{c:"Luogo asciutto, areato e in ombra; mai in frigorifero (germoglia e si ammorbidisce).",o:"Svizzera, raccolta estiva, lunga conservazione.",a:"importato (Spagna, Cina), lungo trasporto."}},
 "Betterave rouge":{de:{c:"Kühlschrank ohne Grün, oder Keller. Lange haltbar.",o:"Schweiz, Sommer–Herbst, dann Lager.",a:""},it:{c:"Frigorifero senza foglie, o cantina. Lunga conservazione.",o:"Svizzera, estate–autunno, poi conservazione.",a:""}},
 "Céleri-rave":{de:{c:"Kühlschrank oder Keller. Sehr gut lagerfähig.",o:"Schweiz, Herbst, dann Winterlager.",a:""},it:{c:"Frigorifero o cantina. Ottima conservazione.",o:"Svizzera, autunno, poi conservazione invernale.",a:""}},
 "Fenouil":{de:{c:"Kühlschrank, im Beutel, innert einer Woche.",o:"Schweiz und Italien in der Saison, Sommer–Herbst.",a:"importiert."},it:{c:"Frigorifero, in un sacchetto, entro una settimana.",o:"Svizzera e Italia di stagione, estate–autunno.",a:"importato."}},
 "Aubergine":{de:{c:"Vorzugsweise bei Raumtemperatur (kälteempfindlich), innert weniger Tage.",o:"Schweiz (Gewächshaus) und Italien in der Saison, Hochsommer.",a:"importiert (Spanien, Niederlande) aus dem beheizten Gewächshaus."},it:{c:"Preferibilmente a temperatura ambiente (sensibile al freddo), entro pochi giorni.",o:"Svizzera (serra) e Italia di stagione, piena estate.",a:"importata (Spagna, Paesi Bassi) da serra riscaldata."}},
 "Poivron":{de:{c:"Eher dunkel und kühl (Keller) als im Kühlschrank lagern; innert einer Woche.",o:"Schweiz (Gewächshaus) und Italien in der Saison, Sommer–Herbst.",a:"importiert (Spanien, Niederlande) aus dem beheizten Gewächshaus."},it:{c:"Conservare in luogo buio e fresco (cantina) piuttosto che in frigorifero; entro una settimana.",o:"Svizzera (serra) e Italia di stagione, estate–autunno.",a:"importato (Spagna, Paesi Bassi) da serra riscaldata."}},
 "Concombre":{de:{c:"Kühlschrank (nicht im kältesten Bereich), innert einer Woche.",o:"Schweiz, im Sommer im Freiland; Gewächshaus in den Zwischensaisons.",a:"aus dem beheizten Gewächshaus importiert."},it:{c:"Frigorifero (non nella zona più fredda), entro una settimana.",o:"Svizzera, in pieno campo in estate; serra nelle mezze stagioni.",a:"importato da serra riscaldata."}},
 "Haricot":{de:{c:"Kühlschrank, im Beutel, einige Tage. Blanchiert einfrierbar.",o:"Schweiz, Sommer.",a:"importiert (Kenia, Ägypten, Marokko), oft per Flugzeug."},it:{c:"Frigorifero, in un sacchetto, pochi giorni. Si congela sbollentato.",o:"Svizzera, estate.",a:"importato (Kenya, Egitto, Marocco), spesso in aereo."}},
 "Petits pois":{de:{c:"Rasch auspalen und verzehren (Zucker wandelt sich schnell in Stärke). Frisch einfrierbar.",o:"Schweiz, Juni–Juli.",a:"vor allem tiefgekühlt oder in der Dose."},it:{c:"Sgranare e consumare rapidamente (lo zucchero si trasforma in amido). Si congelano freschi.",o:"Svizzera, giugno–luglio.",a:"soprattutto surgelati o in scatola."}},
 "Asperge":{de:{c:"Kühlschrank, stehend in etwas Wasser oder in ein feuchtes Tuch gewickelt; rasch verzehren.",o:"Schweiz, April bis Juni.",a:"importiert (Peru, Mexiko), lange Transportwege.",v:"Grüner Spargel (wächst im Freien) und weisser Spargel (angehäufelt, vor Licht geschützt), April–Juni."},it:{c:"Frigorifero, in piedi in poca acqua o avvolto in un panno umido; consumare rapidamente.",o:"Svizzera, da aprile a giugno.",a:"importato (Perù, Messico), lungo trasporto.",v:"Asparago verde (cresce all'aperto) e asparago bianco (rincalzato, al riparo dalla luce), aprile–giugno."}},
 "Radis":{de:{c:"Kühlschrank ohne Grün; rasch verzehren (wird in einigen Tagen weich).",o:"Schweiz, Freiland von Frühling bis Herbst; Gewächshaus in den Zwischensaisons.",a:""},it:{c:"Frigorifero senza foglie; consumare rapidamente (ammorbidisce in pochi giorni).",o:"Svizzera, pieno campo dalla primavera all'autunno; serra nelle mezze stagioni.",a:""}},
 "Endive":{de:{c:"Kühlschrank, vor Licht geschützt (das Bitterkeit fördert), in einem lichtdichten Beutel.",o:"Schweiz und Belgien, Herbst und Winter.",k:"Durch Treiberei erzeugt: die Wurzeln treiben im Dunkeln (Herbst–Winter)."},it:{c:"Frigorifero, al riparo dalla luce (che sviluppa l'amarezza), in un sacchetto opaco.",o:"Svizzera e Belgio, autunno e inverno.",k:"Prodotta per forzatura: le radici germogliano al buio (autunno–inverno)."}},
 "Maïs doux":{de:{c:"Kühlschrank in den Blättern, rasch verzehren (Zucker wird zu Stärke).",o:"Schweiz, Spätsommer (August–September).",a:""},it:{c:"Frigorifero nelle foglie, consumare rapidamente (lo zucchero diventa amido).",o:"Svizzera, fine estate (agosto–settembre).",a:""}},
 "Panais":{de:{c:"Kühlschrank oder Keller. Frost auf dem Feld verstärkt die Süsse.",o:"Schweiz, Herbst und Winter.",a:""},it:{c:"Frigorifero o cantina. Il gelo in campo accentua la dolcezza.",o:"Svizzera, autunno e inverno.",a:""}},
 "Topinambour":{de:{c:"Kühlschrank im Beutel (trocknet rasch aus) oder feuchter Keller.",o:"Schweiz, Herbst und Winter.",a:""},it:{c:"Frigorifero nel sacchetto (si disidrata in fretta) o cantina umida.",o:"Svizzera, autunno e inverno.",a:""}},
 "Navet":{de:{c:"Kühlschrank ohne Grün, oder Keller.",o:"Schweiz, Herbst und Winter.",a:""},it:{c:"Frigorifero senza foglie, o cantina.",o:"Svizzera, autunno e inverno.",a:""}},
 "Salsifis":{de:{c:"Kühlschrank oder Keller, in einem Tuch; hält mehrere Wochen.",o:"Schweiz, Herbst und Winter.",a:""},it:{c:"Frigorifero o cantina, in un panno; si conserva diverse settimane.",o:"Svizzera, autunno e inverno.",a:""}},
 "Scorsonère":{de:{c:"Kühlschrank oder Keller, in einem Tuch; hält mehrere Wochen.",o:"Schweiz, Herbst und Winter.",a:""},it:{c:"Frigorifero o cantina, in un panno; si conserva diverse settimane.",o:"Svizzera, autunno e inverno.",a:""}},
 "Cardon":{de:{c:"Keller oder Kühlschrank, eingewickelt; hält einige Wochen.",o:"Schweiz (Genf, AOP-Stachelkardone), Spätherbst und Frühwinter.",k:"Traditionelles Genfer Wintergemüse; die Rippen werden gekocht gegessen."},it:{c:"Cantina o frigorifero, avvolto; si conserva qualche settimana.",o:"Svizzera (Ginevra, cardo spinoso AOP), tardo autunno e inizio inverno.",k:"Ortaggio invernale tradizionale ginevrino; le coste si consumano cotte."}},
 "Bette à carde":{de:{c:"Kühlschrank, im Beutel, einige Tage.",o:"Schweiz, Sommer und Herbst.",a:""},it:{c:"Frigorifero, in un sacchetto, pochi giorni.",o:"Svizzera, estate e autunno.",a:""}},
 "Champignon de Paris":{de:{c:"Kühlschrank im Papierbeutel (nie geschlossener Plastik). Nicht waschen: abbürsten.",o:"Schweiz, ganzjährig kultiviert."},it:{c:"Frigorifero nel sacchetto di carta (mai plastica chiusa). Non lavare: spazzolare.",o:"Svizzera, coltivato tutto l'anno."}},
 "Pleurote":{de:{c:"Kühlschrank im Papierbeutel, innert weniger Tage verzehren.",o:"Schweiz, ganzjährig kultiviert."},it:{c:"Frigorifero nel sacchetto di carta, consumare entro pochi giorni.",o:"Svizzera, coltivato tutto l'anno."}},
 "Shiitake":{de:{c:"Kühlschrank im Papierbeutel, innert weniger Tage verzehren.",o:"Schweiz (kultiviert) und Import; ganzjährig verfügbar."},it:{c:"Frigorifero nel sacchetto di carta, consumare entro pochi giorni.",o:"Svizzera (coltivato) e import; disponibile tutto l'anno."}},
 "Girolle":{de:{c:"Kühlschrank in einem luftigen Behälter, innert 1–2 Tagen. Nicht einweichen: abbürsten.",o:"Schweiz (Sammlung), Sommer bis Herbst; auch importiert.",a:"importiert oder getrocknet.",d:"Verwechslungsgefahr mit giftigen Arten (Ölbaumtrichterling, Falscher Pfifferling). Nur sicher bestimmte Pilze essen; im Zweifel die Ernte von einer offiziellen Pilzkontrolle (VAPKO) prüfen lassen."},it:{c:"Frigorifero in un contenitore areato, entro 1–2 giorni. Non immergere: spazzolare.",o:"Svizzera (raccolta), estate–autunno; anche importato.",a:"importato o essiccato.",d:"Rischio di confusione con specie tossiche (Omphalotus, falso gallinaccio). Consumare solo funghi identificati con certezza; in caso di dubbio far controllare la raccolta da un controllore ufficiale (VAPKO)."}},
 "Cèpe":{de:{c:"Kühlschrank in einem luftigen Behälter, innert 1–2 Tagen. Abbürsten, nicht einweichen.",o:"Schweiz (Sammlung), Spätsommer bis Herbst; auch importiert.",a:"importiert oder getrocknet.",d:"Verwechslungsgefahr mit dem Satansröhrling (giftig) oder dem Gallenröhrling. Nur sicher bestimmte Pilze essen; im Zweifel die Ernte von einer offiziellen Pilzkontrolle (VAPKO) prüfen lassen."},it:{c:"Frigorifero in un contenitore areato, entro 1–2 giorni. Spazzolare, non immergere.",o:"Svizzera (raccolta), fine estate–autunno; anche importato.",a:"importato o essiccato.",d:"Rischio di confusione con il boleto di Satana (tossico) o il boleto amaro. Consumare solo funghi identificati con certezza; in caso di dubbio far controllare la raccolta da un controllore ufficiale (VAPKO)."}},
 "Morille":{de:{c:"Rasch verzehren oder getrocknet. Kühlschrank im Papierbeutel.",o:"Schweiz (Sammlung), Frühling; auch importiert (oft getrocknet).",a:"importiert.",d:"Roh giftig: nur gut gekocht verzehren. Verwechslungsgefahr mit der Frühjahrslorchel, potenziell tödlich. Im Zweifel die Ernte von einer offiziellen Pilzkontrolle (VAPKO) prüfen lassen."},it:{c:"Consumare rapidamente, o essiccata. Frigorifero nel sacchetto di carta.",o:"Svizzera (raccolta), primavera; anche importata (spesso essiccata).",a:"importata.",d:"Tossica cruda: consumare solo ben cotta. Rischio di confusione con la gyromitra, potenzialmente mortale. In caso di dubbio far controllare la raccolta da un controllore ufficiale (VAPKO)."}},
 "Trompette de la mort":{de:{c:"Kühlschrank in einem luftigen Behälter, innert 1–2 Tagen; trocknet sehr gut.",o:"Schweiz (Sammlung), Herbst.",a:"importiert oder getrocknet.",d:"Nur sicher bestimmte Pilze essen; im Zweifel die Ernte von einer offiziellen Pilzkontrolle (VAPKO) prüfen lassen."},it:{c:"Frigorifero in un contenitore areato, entro 1–2 giorni; si essicca molto bene.",o:"Svizzera (raccolta), autunno.",a:"importata o essiccata.",d:"Consumare solo funghi identificati con certezza; in caso di dubbio far controllare la raccolta da un controllore ufficiale (VAPKO)."}},
 "Pied-de-mouton":{de:{c:"Kühlschrank in einem luftigen Behälter, innert 1–2 Tagen.",o:"Schweiz (Sammlung), Herbst und Frühwinter.",a:"importiert.",d:"Nur sicher bestimmte Pilze essen; im Zweifel die Ernte von einer offiziellen Pilzkontrolle (VAPKO) prüfen lassen."},it:{c:"Frigorifero in un contenitore areato, entro 1–2 giorni.",o:"Svizzera (raccolta), autunno e inizio inverno.",a:"importato.",d:"Consumare solo funghi identificati con certezza; in caso di dubbio far controllare la raccolta da un controllore ufficiale (VAPKO)."}},
 "Noix":{de:{c:"In der Schale: trocken, kühl und luftig, lange haltbar. Kerne: luftdicht im Kühl- oder Gefrierschrank (Fett wird ranzig).",o:"Schweiz, Ernte September–Oktober; in der Schale ganzjährig verfügbar."},it:{c:"In guscio: luogo asciutto, fresco e areato, lunga conservazione. Gherigli: contenitore ermetico in frigo o freezer (i grassi irrancidiscono).",o:"Svizzera, raccolta settembre–ottobre; in guscio disponibile tutto l'anno."}},
 "Noisette":{de:{c:"In der Schale: trocken und kühl. Geschält: luftdicht, vor Licht geschützt.",o:"Schweiz, Ernte August–September."},it:{c:"In guscio: luogo asciutto e fresco. Sgusciate: contenitore ermetico, al riparo dalla luce.",o:"Svizzera, raccolta agosto–settembre."}},
 "Amande":{de:{c:"Luftdicht, trocken und vor Licht geschützt; Kühlschrank für lange Lagerung.",o:"Importiert (Spanien, Italien, USA); Ernte August–September in den Erzeugerländern."},it:{c:"Contenitore ermetico, all'asciutto e al riparo dalla luce; frigorifero per lunga conservazione.",o:"Importata (Spagna, Italia, USA); raccolta agosto–settembre nei paesi produttori."}},
 "Cacahuète":{de:{c:"Luftdicht, trocken; vor Licht und Wärme geschützt.",o:"Importiert (tropische und subtropische Gebiete); ganzjährig verfügbar."},it:{c:"Contenitore ermetico, all'asciutto; al riparo da luce e calore.",o:"Importata (zone tropicali e subtropicali); disponibile tutto l'anno."}},
 "Noix de cajou":{de:{c:"Luftdicht, trocken; Kühl- oder Gefrierschrank für lange Lagerung.",o:"Importiert (Indien, Westafrika, Vietnam)."},it:{c:"Contenitore ermetico, all'asciutto; frigo o freezer per lunga conservazione.",o:"Importato (India, Africa occidentale, Vietnam)."}},
 "Pistache":{de:{c:"Luftdicht, trocken und vor Licht geschützt.",o:"Importiert (Iran, Türkei, USA)."},it:{c:"Contenitore ermetico, all'asciutto e al riparo dalla luce.",o:"Importato (Iran, Turchia, USA)."}},
 "Graine de tournesol":{de:{c:"Luftdicht, trocken und vor Licht geschützt; Kühlschrank für lange Lagerung.",o:"Schweiz (Sonnenblumenanbau) und Import; Ernte September–Oktober."},it:{c:"Contenitore ermetico, all'asciutto e al riparo dalla luce; frigorifero per lunga conservazione.",o:"Svizzera (girasole coltivato) e import; raccolta settembre–ottobre."}},

function seasonOf(it,m){ return parseInt(it.s[m],10); }
function statusText(it,m){
  const v=seasonOf(it,m);
  if(it.t==='autre') return v>=2?t('st_alpage'):t('st_year');
  if(it.t==='champignon' && v===1) return t('st_mush_year');
  return v===2?t('st_ext') : v===3?t('st_serre') : v===1?t('st_cons') : t('st_off');
}
function rangeBy(it,pred){
  const present=Array.from({length:12},(_,m)=>pred(it.s[m]));
  if(present.every(x=>x)) return t('all_year');
  if(!present.some(x=>x)) return '—';
  const MF=monthsFull(); let starts=[];
  for(let m=0;m<12;m++){ if(present[m]&&!present[(m+11)%12]) starts.push(m); }
  return starts.map(s=>{ let e=s; while(present[(e+1)%12]) e=(e+1)%12; return s===e?MF[s]:MF[s]+'–'+MF[e]; }).join(', ');
}
function harvestRange(it){ return rangeBy(it,c=>c==='2'||c==='3'); }
function availRange(it){ return rangeBy(it,c=>c!=='0'); }

function harvestLen(it){ let n=0; for(let m=0;m<12;m++) if(it.s[m]==='2') n++; return n; }
function lvl2(it,m){ return it.s[m]==='2'; }
function badgeOf(it,m){ const next=(m+1)%12; if(!lvl2(it,m)&&lvl2(it,next)) return 'soon'; if(lvl2(it,m)&&!lvl2(it,next)) return 'last'; return ''; }
function transportClass(it,m){ const v=seasonOf(it,m); if(v>=2) return 'fresh'; if(v===1&&!it.imp) return 'storage'; return it.tr==='loin'?'far':'near'; }

function haystack(it){ const x=NAMES[it.n]||{}; return [it.n,it.alt||'',x.de||'',x.it||''].join(' ').toLowerCase(); }
function itemMatches(it){
  if(curType!=='tous' && it.t!==curType) return false;
  if(localOnly && seasonOf(it,curMonth)!==2) return false;
  if(query && haystack(it).indexOf(query.toLowerCase())===-1) return false;
  return true;
}
function sortedFor(month){ return DATA.map((it,i)=>({it,i})).filter(o=>itemMatches(o.it)).sort((a,b)=> seasonOf(b.it,month)-seasonOf(a.it,month) || nm(a.it).localeCompare(nm(b.it),settings.lang)); }

      '<div class="miniyear">'+year+'</div>'+
      '<div class="src">'+t('src_prefix')+' <a href="https://www.blw.admin.ch" target="_blank" rel="noopener">OFAG</a>, <a href="https://www.gemuese.ch" target="_blank" rel="noopener">gemüse.ch</a>, <a href="https://www.swissmilk.ch" target="_blank" rel="noopener">Swissmilk</a>, <a href="https://www.wwf.ch" target="_blank" rel="noopener">WWF</a><br>'+t('src_vary')+'</div></div>'+
    '<div class="card field"><div class="flabel">🌍 '+t('f_transport')+'</div>'+
      '<div class="fval"><span class="trbig tr-'+trc+'">'+trIcon(trc)+' '+trLabel(trc)+'</span> <span class="off">· '+t('tr_thismonth')+'</span></div></div>'+
    (dV?'<div class="card field danger"><div class="flabel">⚠️ '+t('f_safety')+'</div><div class="fval">'+dV+'</div></div>':'')+
    '<div class="card field"><div class="flabel">❄️ '+t('f_cons')+'</div><div class="fval">'+cV+'</div></div>'+
    '<div class="card field"><div class="flabel">🌱 '+t('f_origin')+'</div>'+originBlock+'</div>'+
    (vV?'<div class="card field"><div class="flabel">🌾 '+t('f_var')+'</div><div class="fval">'+vV+'</div></div>':'')+
    (kV?'<div class="card field"><div class="flabel">ℹ️ '+t('f_note')+'</div><div class="fval">'+kV+'</div></div>':'')+
    '<div class="card field"><div class="flabel">🔗 '+t('f_links')+'</div><div class="linkrow">'+
      '<a class="linkbtn" href="'+wikiUrl(it)+'" target="_blank" rel="noopener">'+t('link_wiki')+(it.wl==='en'?t('wiki_en'):'')+' ↗</a>'+
      '<a class="linkbtn" href="'+imgUrl(it)+'" target="_blank" rel="noopener">'+t('link_img')+' ↗</a></div></div>'+
    '<div class="card field"><div class="flabel">📝 '+t('f_comments')+'</div>'+
      '<textarea class="note-input" id="commentInput" placeholder="'+t('comment_ph')+'" oninput="onComment('+i+', this.value)">'+escapeHtml(commentOf(it.n))+'</textarea>'+
      '<div class="savehint" id="saveHint"></div></div>'+
    '<div style="height:24px"></div>';
  let dly=0; document.querySelectorAll('#o-body .field').forEach(f=>{ f.style.animationDelay=dly+'ms'; dly+=40; });
  document.getElementById('overlay').classList.add('open');
  document.body.classList.add('modal-open');
}
function closeDetail(){ document.getElementById('overlay').classList.remove('open'); document.body.classList.remove('modal-open'); detailIndex=null; if(curTab==='favoris') render(); }
function toggleFavFromDetail(btn){ if(detailIndex==null) return; const it=DATA[detailIndex]; toggleFav(it.n); btn.textContent=isFav(it.n)?'♥':'♡'; btn.classList.toggle('on',isFav(it.n)); btn.classList.remove('pop'); void btn.offsetWidth; btn.classList.add('pop'); toast(isFav(it.n)?t('toast_add'):t('toast_rem')); }
function onComment(i,val){ const it=DATA[i]; setComment(it.n,val); const h=document.getElementById('saveHint'); if(h){ h.textContent=t('comment_saved'); clearTimeout(commentTimer); commentTimer=setTimeout(()=>{ if(h) h.textContent=''; },1600); } }
function fadeSwap(el, html, after){ if(!el) return; el.style.transition='opacity .15s ease, transform .15s ease'; el.style.opacity='0'; el.style.transform='translateY(5px)'; setTimeout(()=>{ el.innerHTML=html; el.style.opacity='1'; el.style.transform='none'; if(after) requestAnimationFrame(after); },140); }
function quickFav(n,btn){ toggleFav(n); const on=isFav(n); btn.textContent=on?'♥':'♡'; btn.classList.toggle('on',on); btn.classList.remove('pop'); void btn.offsetWidth; btn.classList.add('pop'); if(curTab==='favoris') render(); toast(on?t('toast_add'):t('toast_rem')); }
function changeMonth(d){ curMonth=(curMonth+d+12)%12; render(); const l=document.getElementById('list'); if(l){ l.style.opacity='0'; l.style.transform='translateY(5px)'; requestAnimationFrame(()=>{ l.style.transition='opacity .22s ease, transform .22s ease'; l.style.opacity='1'; l.style.transform='none'; }); } }
function setType(tp){ curType=tp; document.querySelectorAll('.seg button').forEach(b=>b.classList.toggle('on', b.dataset.cat===tp)); if(curTab==='now'){ const sub=document.getElementById('nowsub'); if(sub) sub.textContent=subText(); fadeSwap(document.getElementById('list'), listHtml()); } else if(curTab==='calendrier'){ fadeSwap(document.getElementById('calbody'), calBodyHtml()); } }
function toggleLocal(){ localOnly=!localOnly; const c=document.querySelector('.chip'); if(c) c.classList.toggle('on',localOnly); fadeSwap(document.getElementById('list'), listHtml()); }
function bindSearch(){ const q=document.getElementById('q'); if(q){ q.addEventListener('input', e=>{ query=e.target.value; const el=document.getElementById('list'); if(el) el.innerHTML=listHtml(); }); } }
function switchTab(tp){ curTab=tp; query=''; curMonth=new Date().getMonth(); document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on', b.dataset.tab===tp)); render(); window.scrollTo(0,0); const child=document.querySelector('#app > .screen'); if(child){ child.classList.remove('anim-in'); void child.offsetWidth; child.classList.add('anim-in'); } }

/* thème + langue + daltonien */
function resolvedTheme(){ const th=settings.theme; return th==='auto'?(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light'):th; }
function applyTheme(){ const m=resolvedTheme(); document.documentElement.setAttribute('data-theme',m); const meta=document.getElementById('themeColorMeta'); if(meta) meta.setAttribute('content', m==='dark'?'#15100D':'#FBF7F2'); }
function applyCb(){ if(settings.cb) document.documentElement.setAttribute('data-cb','1'); else document.documentElement.removeAttribute('data-cb'); }
function setLang(l){ if(l!=='fr' && l!==settings.lang){ const msg=(I18N[l]&&I18N[l].lang_confirm)||''; if(msg && !window.confirm(msg)) return; } settings.lang=l; save(); applyStaticI18n(); render(); }
function setTheme(th){ settings.theme=th; save(); applyTheme(); render(); }
function toggleCb(){ settings.cb=!settings.cb; save(); applyCb(); render(); }
matchMedia('(prefers-color-scheme: dark)').addEventListener('change',()=>{ if(settings.theme==='auto') applyTheme(); });

/* export / import */
function exportData(){ try{ const blob=new Blob([JSON.stringify({app:'edoSeasonsTracker',version:VERSION,fav:store.fav,comments:store.comments,settings:settings},null,2)],{type:'application/json'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download='edoseasonstracker-donnees.json'; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1000); toast(t('export_done')); }catch(e){ toast(t('import_err')); } }
function onImportFile(ev){ const f=ev.target.files&&ev.target.files[0]; if(!f) return; const r=new FileReader(); r.onload=()=>{ try{ const d=JSON.parse(r.result); if(Array.isArray(d.fav)) store.fav=d.fav; if(d.comments&&typeof d.comments==='object') store.comments=d.comments; if(d.settings){ settings=Object.assign(settings,d.settings); store.settings=settings; } save(); applyTheme(); applyCb(); applyStaticI18n(); render(); toast(t('import_done')); }catch(e){ toast(t('import_err')); } ev.target.value=''; }; r.readAsText(f); }

/* utils */
function escj(s){ return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
function escapeHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
let toastTimer=null;
function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove('show'),1900); }

if('serviceWorker' in navigator && location.protocol.indexOf('http')===0){ window.addEventListener('load',()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); }); }

applyTheme(); applyCb(); applyStaticI18n(); render();
</script>
</body>
</html>
